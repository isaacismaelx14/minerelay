name: admin-build

on:
  push:
    tags:
      - "@minerelay/admin/v*"
  workflow_dispatch:
    inputs:
      run_from_main:
        description: Build and deploy from the current main branch instead of checking out a tag
        required: false
        default: false
        type: boolean
      tag:
        description: Existing @minerelay/admin tag to build or deploy
        required: false
        type: string

jobs:
  build-admin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_ADMIN_API_ORIGIN: ${{ vars.NEXT_PUBLIC_ADMIN_API_ORIGIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_from_main == 'true' && 'main' || github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Validate manual dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          RUN_FROM_MAIN="${{ github.event.inputs.run_from_main }}"
          TAG="${{ github.event.inputs.tag }}"

          if [ "$RUN_FROM_MAIN" = "true" ] && [ -n "$TAG" ]; then
            echo "Choose exactly one source: set 'run_from_main' OR provide an admin tag." >&2
            exit 1
          fi

          if [ "$RUN_FROM_MAIN" != "true" ] && [ -z "$TAG" ]; then
            echo "Provide an admin tag or enable 'run_from_main'." >&2
            exit 1
          fi

          if [ -n "$TAG" ]; then
            case "$TAG" in
              @minerelay/admin/v*)
                ;;
              *)
                echo "Invalid tag '$TAG'. Expected format: @minerelay/admin/v*." >&2
                exit 1
                ;;
            esac
          fi

      - name: Validate admin API origin
        shell: bash
        run: |
          node -e 'const value=(process.env.NEXT_PUBLIC_ADMIN_API_ORIGIN||"").trim(); if(!value){console.error("Missing repository variable NEXT_PUBLIC_ADMIN_API_ORIGIN."); process.exit(1)}; let parsed; try { parsed = new URL(value); } catch { console.error(`Invalid NEXT_PUBLIC_ADMIN_API_ORIGIN: ${value}`); process.exit(1) } if(parsed.protocol!=="http:"&&parsed.protocol!=="https:"){console.error(`NEXT_PUBLIC_ADMIN_API_ORIGIN must use http/https: ${value}`); process.exit(1)}'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint admin app
        run: pnpm --filter @minerelay/admin lint

      - name: Typecheck admin app
        run: pnpm --filter @minerelay/admin typecheck

      - name: Test admin app
        run: pnpm --filter @minerelay/admin test

      - name: Build admin app
        run: pnpm --filter @minerelay/admin build

  deploy-admin:
    if: startsWith(github.ref, 'refs/tags/@minerelay/admin/v') || github.event_name == 'workflow_dispatch'
    needs: build-admin
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: admin-production-deploy
      cancel-in-progress: false
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_from_main == 'true' && 'main' || github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate deploy configuration
        shell: bash
        run: |
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "Missing RAILWAY_TOKEN secret." >&2
            exit 1
          fi

          PROJECT_ID="${RAILWAY_PROJECT_ID:-2e1199e7-8617-445e-a258-0e17212cadfc}"
          node -e 'const projectId=(process.env.PROJECT_ID||"").trim(); if(!/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(projectId)){console.error(`Invalid RAILWAY_PROJECT_ID: ${projectId}`); process.exit(1)}'
        env:
          PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID || '2e1199e7-8617-445e-a258-0e17212cadfc' }}

      - name: Deploy admin app to Railway
        run: |
          set -euo pipefail

          PROJECT_ID="${RAILWAY_PROJECT_ID:-2e1199e7-8617-445e-a258-0e17212cadfc}"
          BEFORE_DEPLOY_ID="$(railway service status -s admin --json | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{try{const j=JSON.parse(s);process.stdout.write(j.deploymentId||'')}catch{process.stdout.write('')}})")"
          echo "Previous deployment ID: ${BEFORE_DEPLOY_ID:-<none>}"

          DEPLOY_OUTPUT="$(railway up \
            --service admin \
            --environment production \
            --project "$PROJECT_ID" \
            --detach 2>&1)"
          echo "$DEPLOY_OUTPUT"

          DEPLOY_ID="$(printf '%s\n' "$DEPLOY_OUTPUT" | sed -n 's/.*id=\([0-9a-f-]\{36\}\).*/\1/p' | head -n 1)"
          if [ -z "${DEPLOY_ID:-}" ]; then
            echo "Could not parse deployment ID from railway up output."
            DEPLOY_ID="$BEFORE_DEPLOY_ID"
          fi
          echo "Triggered deployment ID: ${DEPLOY_ID:-<unknown>}"

          for i in $(seq 1 90); do
            STATUS_JSON="$(railway service status -s admin --json)"
            CURRENT_ID="$(printf '%s' "$STATUS_JSON" | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const j=JSON.parse(s);process.stdout.write(j.deploymentId||'')})")"
            CURRENT_STATUS="$(printf '%s' "$STATUS_JSON" | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const j=JSON.parse(s);process.stdout.write(j.status||'')})")"

            echo "Poll $i: deployment=$CURRENT_ID status=$CURRENT_STATUS"

            if [ -n "${DEPLOY_ID:-}" ] && [ "$CURRENT_ID" != "$DEPLOY_ID" ]; then
              sleep 5
              continue
            fi

            case "$CURRENT_STATUS" in
              SUCCESS|SLEEPING)
                echo "Railway deployment succeeded."
                exit 0
                ;;
              FAILED|CRASHED|REMOVED|CANCELED)
                echo "Railway deployment failed with status=$CURRENT_STATUS"
                echo "Build logs:"
                railway service logs -s admin --build -n 200 "$CURRENT_ID" || true
                echo "Runtime logs:"
                railway service logs -s admin --deployment -n 120 "$CURRENT_ID" || true
                exit 1
                ;;
            esac

            sleep 5
          done

          echo "Timed out waiting for Railway deployment to reach a terminal state."
          exit 1
