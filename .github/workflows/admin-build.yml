name: admin-build

on:
  push:
    tags:
      - "@minerelay/admin/v*"

jobs:
  build-admin:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_ADMIN_API_ORIGIN: ${{ vars.NEXT_PUBLIC_ADMIN_API_ORIGIN || 'https://api.example.com' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Lint admin app
        run: pnpm --filter @minerelay/admin lint

      - name: Typecheck admin app
        run: pnpm --filter @minerelay/admin typecheck

      - name: Test admin app
        run: pnpm --filter @minerelay/admin test

      - name: Build admin app
        run: pnpm --filter @minerelay/admin build

      - name: Deploy admin app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @minerelay/admin deploy -- --env production
