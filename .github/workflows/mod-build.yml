name: mod-build

on:
  push:
    branches: [main]
    paths:
      - 'mods/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'build.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/mod-build.yml'
  pull_request:
    paths:
      - 'mods/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'build.gradle.kts'
      - 'settings.gradle'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/mod-build.yml'

jobs:
  build-mod:
    if: ${{ hashFiles('mods/server-lock/**') != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.14.4

      - name: Build server-lock mod
        working-directory: mods/server-lock
        run: gradle build --no-daemon

      - name: Upload mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-lock-mod
          path: mods/server-lock/build/devlibs/*.jar
