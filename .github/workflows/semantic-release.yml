name: semantic-release

on:
  workflow_dispatch:
    inputs:
      target:
        description: Release target
        required: true
        default: auto
        type: choice
        options:
          - auto
          - api
          - launcher
          - shared
      channel:
        description: Release channel
        required: true
        default: beta
        type: choice
        options:
          - beta
          - alpha
          - release
      bump:
        description: Bump override (auto uses semantic commits)
        required: true
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      next_version:
        description: Exact next version override (optional, e.g. 0.1.0-beta.32)
        required: false
        type: string
      notes_mode:
        description: Release notes source
        required: true
        default: ai
        type: choice
        options:
          - ai
          - raw
      notes_model:
        description: AI model for customer notes
        required: true
        default: gpt-4.1-mini
        type: string
      notes_max_input_chars:
        description: Cost guardrail for AI input size
        required: true
        default: "12000"
        type: string
      notes_max_output_tokens:
        description: Cost guardrail for AI output size
        required: true
        default: "900"
        type: string
      ai_scope_infer:
        description: Use AI to infer scope for legacy non-scoped commits
        required: true
        default: false
        type: boolean
      dry_run:
        description: Dry run only
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: semantic-release-${{ github.event.inputs.target }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.ref == 'refs/heads/main' || github.event.inputs.dry_run == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Run semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          EXTRA_ARGS=()
          if [ -n "${{ github.event.inputs.next_version }}" ]; then
            EXTRA_ARGS+=(--next-version "${{ github.event.inputs.next_version }}")
          fi
          if [ "${{ github.event.inputs.bump }}" != "auto" ]; then
            EXTRA_ARGS+=(--bump "${{ github.event.inputs.bump }}")
          fi
          EXTRA_ARGS+=(--notes-mode "${{ github.event.inputs.notes_mode }}")
          EXTRA_ARGS+=(--notes-model "${{ github.event.inputs.notes_model }}")
          EXTRA_ARGS+=(--notes-max-input-chars "${{ github.event.inputs.notes_max_input_chars }}")
          EXTRA_ARGS+=(--notes-max-output-tokens "${{ github.event.inputs.notes_max_output_tokens }}")
          if [ "${{ github.event.inputs.ai_scope_infer }}" = "true" ]; then
            EXTRA_ARGS+=(--ai-scope-infer)
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            pnpm release:target -- --target "${{ github.event.inputs.target }}" --channel "${{ github.event.inputs.channel }}" --dry-run --skip-github --skip-push "${EXTRA_ARGS[@]}"
          else
            pnpm release:target -- --target "${{ github.event.inputs.target }}" --channel "${{ github.event.inputs.channel }}" "${EXTRA_ARGS[@]}"
          fi

  build-api-after-release:
    if: ${{ needs.release.result == 'success' && github.event.inputs.dry_run != 'true' }}
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build shared package
        run: pnpm --filter @mss/shared build

      - name: Generate Prisma client
        run: pnpm --filter @mss/api prisma:generate

      - name: Run API unit tests
        run: pnpm --filter @mss/api exec jest --passWithNoTests --runInBand

      - name: Build API
        run: pnpm --filter @mss/api build
