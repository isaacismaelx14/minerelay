name: semantic-release

on:
  workflow_dispatch:
    inputs:
      target_mode:
        description: Release selection mode
        required: true
        default: auto
        type: choice
        options:
          - auto
          - selected
      target_api:
        description: Include api when using selected mode
        required: false
        default: false
        type: boolean
      target_admin:
        description: Include admin when using selected mode
        required: false
        default: false
        type: boolean
      target_launcher:
        description: Include launcher when using selected mode
        required: false
        default: false
        type: boolean
      target_shared:
        description: Include shared when using selected mode
        required: false
        default: false
        type: boolean
      bump:
        description: Bump override (auto uses semantic commits)
        required: true
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      next_version:
        description: Exact next version override (optional, e.g. 0.1.0-beta.32)
        required: false
        type: string
      notes_mode:
        description: Release notes source
        required: true
        default: ai
        type: choice
        options:
          - ai
          - raw
      notes_model:
        description: AI model for customer notes
        required: true
        default: gpt-4.1-mini
        type: string
      notes_max_input_chars:
        description: Cost guardrail for AI input size
        required: true
        default: "12000"
        type: string
      notes_max_output_tokens:
        description: Cost guardrail for AI output size
        required: true
        default: "900"
        type: string
      ai_scope_infer:
        description: Use AI to infer scope for legacy non-scoped commits
        required: true
        default: false
        type: boolean

concurrency:
  group: semantic-release-${{ github.event.inputs.target_mode }}-${{ github.event.inputs.target_api }}-${{ github.event.inputs.target_admin }}-${{ github.event.inputs.target_launcher }}-${{ github.event.inputs.target_shared }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate workflow fan-out token
        run: |
          if [ -z "${{ secrets.RELEASE_WORKFLOW_TOKEN }}" ]; then
            echo "RELEASE_WORKFLOW_TOKEN is required." >&2
            echo "Reason: tags pushed with GITHUB_TOKEN do not trigger downstream tag workflows (api-build / launcher-release)." >&2
            exit 1
          fi

      - name: Resolve release targets
        id: resolve-targets
        shell: bash
        run: |
          if [ "${{ github.event.inputs.target_mode }}" = "auto" ]; then
            echo "target_spec=auto" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SELECTED_TARGETS=()
          if [ "${{ github.event.inputs.target_api }}" = "true" ]; then
            SELECTED_TARGETS+=(api)
          fi
          if [ "${{ github.event.inputs.target_admin }}" = "true" ]; then
            SELECTED_TARGETS+=(admin)
          fi
          if [ "${{ github.event.inputs.target_launcher }}" = "true" ]; then
            SELECTED_TARGETS+=(launcher)
          fi
          if [ "${{ github.event.inputs.target_shared }}" = "true" ]; then
            SELECTED_TARGETS+=(shared)
          fi

          if [ "${#SELECTED_TARGETS[@]}" -eq 0 ]; then
            echo "Select at least one target when target_mode=selected." >&2
            exit 1
          fi

          TARGET_SPEC=$(IFS=,; echo "${SELECTED_TARGETS[*]}")
          echo "target_spec=$TARGET_SPEC" >> "$GITHUB_OUTPUT"

      - name: Run semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          EXTRA_ARGS=()
          if [ -n "${{ github.event.inputs.next_version }}" ]; then
            EXTRA_ARGS+=(--next-version "${{ github.event.inputs.next_version }}")
          fi
          if [ "${{ github.event.inputs.bump }}" != "auto" ]; then
            EXTRA_ARGS+=(--bump "${{ github.event.inputs.bump }}")
          fi
          EXTRA_ARGS+=(--notes-mode "${{ github.event.inputs.notes_mode }}")
          EXTRA_ARGS+=(--notes-model "${{ github.event.inputs.notes_model }}")
          EXTRA_ARGS+=(--notes-max-input-chars "${{ github.event.inputs.notes_max_input_chars }}")
          EXTRA_ARGS+=(--notes-max-output-tokens "${{ github.event.inputs.notes_max_output_tokens }}")
          if [ "${{ github.event.inputs.ai_scope_infer }}" = "true" ]; then
            EXTRA_ARGS+=(--ai-scope-infer)
          fi
          pnpm release:target -- --target "${{ steps.resolve-targets.outputs.target_spec }}" --channel release "${EXTRA_ARGS[@]}"

  build-api-after-release:
    if: ${{ needs.release.result == 'success' }}
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build shared package
        run: pnpm --filter @minerelay/shared build

      - name: Generate Prisma client
        run: pnpm --filter @minerelay/api prisma:generate

      - name: Run API unit tests
        run: pnpm --filter @minerelay/api exec jest --passWithNoTests --runInBand

      - name: Build API
        run: pnpm --filter @minerelay/api build
