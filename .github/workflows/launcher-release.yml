name: launcher-release

on:
  push:
    tags:
      - "@minerelay/launcher/v*"
  workflow_dispatch:
    inputs:
      run_from_main:
        description: Build from the current main branch instead of checking out the tag
        required: false
        default: false
        type: boolean
      tag:
        description: Existing @minerelay/launcher tag to rebuild and publish assets for
        required: false
        type: string

jobs:
  build-launcher:
    env:
      RUN_FROM_MAIN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_from_main == 'true' }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
      VALIDATION_ONLY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_from_main == 'true' && github.event.inputs.tag == '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            runner_os: Windows
            args: --config src-tauri/tauri.release.conf.json --bundles nsis,msi
          - platform: macos-latest
            runner_os: macOS
            args: --config src-tauri/tauri.release.conf.json --bundles app,dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_from_main == 'true' && 'main' || github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Validate manual dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if [ "${{ github.event.inputs.run_from_main }}" != "true" ] && [ -z "${{ github.event.inputs.tag }}" ]; then
            echo "Provide a launcher tag or enable 'run_from_main'." >&2
            exit 1
          fi

      - name: Warn for main validation runs
        if: env.VALIDATION_ONLY == 'true'
        shell: bash
        run: |
          echo "::warning::This 'run from main' mode is for launcher-release workflow/YAML validation only. It skips publish/verify jobs and should not be used to diagnose launcher code issues."

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Compute release version from tag
        id: version
        if: env.RUN_FROM_MAIN != 'true' || env.RELEASE_TAG != ''
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#@minerelay/launcher/v}"
          if [ -z "$VERSION" ]; then
            echo "Failed to parse version from tag ${RELEASE_TAG}" >&2
            exit 1
          fi
          if [ "$VERSION" = "$RELEASE_TAG" ]; then
            echo "Tag must be in @minerelay/launcher/v<version> format. Received: ${RELEASE_TAG}" >&2
            exit 1
          fi
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Compute release version from main
        id: version_main
        if: env.RUN_FROM_MAIN == 'true' && env.RELEASE_TAG == ''
        shell: bash
        run: |
          VERSION="$(node -p "require('./apps/launcher/package.json').version")"
          if [ -z "$VERSION" ]; then
            echo "Failed to read launcher version from apps/launcher/package.json" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=false" >> "$GITHUB_OUTPUT"

      - name: Stamp launcher version for this release
        shell: bash
        run: node apps/launcher/scripts/set-release-version.mjs "${{ steps.version.outputs.version || steps.version_main.outputs.version }}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build shared package
        run: pnpm --filter @minerelay/shared build

      - name: Validate updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LAUNCHER_UPDATE_PUBKEY: ${{ secrets.LAUNCHER_UPDATE_PUBKEY }}
          PROFILE_SIGNATURE_PUBLIC_KEY: ${{ vars.PROFILE_SIGNATURE_PUBLIC_KEY || secrets.PROFILE_SIGNATURE_PUBLIC_KEY }}
          API_BASE_URL: ${{ vars.LAUNCHER_API_BASE_URL }}
          PROFILE_LOCK_URL: ${{ vars.LAUNCHER_PROFILE_LOCK_URL }}
          LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS: ${{ vars.LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS }}
        run: |
          TAURI_SIGNING_PRIVATE_KEY="$(printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | sed 's/\r$//')"
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD="$(printf '%s' "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" | tr -d '\r\n')"
          PROFILE_SIGNATURE_PUBLIC_KEY="$(printf '%s' "$PROFILE_SIGNATURE_PUBLIC_KEY" | tr -d '\r\n')"
          API_BASE_URL="$(printf '%s' "$API_BASE_URL" | tr -d '\r\n')"
          PROFILE_LOCK_URL="$(printf '%s' "$PROFILE_LOCK_URL" | tr -d '\r\n')"
          LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS="$(printf '%s' "$LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS" | tr -d '\r\n')"
          export TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          export PROFILE_SIGNATURE_PUBLIC_KEY API_BASE_URL PROFILE_LOCK_URL LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS

          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "Missing TAURI_SIGNING_PRIVATE_KEY secret. Updater releases require signing." >&2
            exit 1
          fi
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo "Missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret." >&2
            echo "Passwordless updater keys are not reliable in CI; generate a password-protected key and set both secrets." >&2
            exit 1
          fi
          if [ -z "$LAUNCHER_UPDATE_PUBKEY" ]; then
            echo "Missing LAUNCHER_UPDATE_PUBKEY secret. The app needs the updater public key to verify updates." >&2
            exit 1
          fi
          if [ -z "$PROFILE_SIGNATURE_PUBLIC_KEY" ]; then
            echo "Missing PROFILE_SIGNATURE_PUBLIC_KEY (set repo variable PROFILE_SIGNATURE_PUBLIC_KEY or secret PROFILE_SIGNATURE_PUBLIC_KEY)." >&2
            exit 1
          fi
          node -e 'const raw=(process.env.PROFILE_SIGNATURE_PUBLIC_KEY||"").trim(); if(!raw){console.error("PROFILE_SIGNATURE_PUBLIC_KEY is empty after trimming"); process.exit(1)} if(raw.length%4!==0 || !/^[A-Za-z0-9+/]+={0,2}$/.test(raw)){console.error("PROFILE_SIGNATURE_PUBLIC_KEY must be valid base64"); process.exit(1)} const decoded=Buffer.from(raw,"base64"); if(decoded.length!==32){console.error("PROFILE_SIGNATURE_PUBLIC_KEY must decode to 32 bytes (Ed25519 public key)"); process.exit(1)}'
          node -e 'const api=(process.env.API_BASE_URL||"").trim(); const lock=(process.env.PROFILE_LOCK_URL||"").trim(); const valid=(value)=>{try{const parsed=new URL(value); return parsed.protocol==="http:"||parsed.protocol==="https:"}catch{return false}}; if(api && !valid(api)){console.error("LAUNCHER_API_BASE_URL must be a valid http/https URL"); process.exit(1)} if(lock && !valid(lock)){console.error("LAUNCHER_PROFILE_LOCK_URL must be a valid http/https URL"); process.exit(1)}'
          node -e 'const raw=(process.env.LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS||"").trim(); if(!raw){process.exit(0)} for(const host of raw.split(",").map(v=>v.trim()).filter(Boolean)){if(!/^[a-zA-Z0-9.-]+$/.test(host)){console.error(`Invalid host in LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS: ${host}`); process.exit(1)}}'

          PRECHECK_FILE="$(mktemp)"
          printf 'updater-signing-precheck\n' > "$PRECHECK_FILE"
          if ! pnpm --filter @minerelay/launcher tauri signer sign "$PRECHECK_FILE" >/dev/null 2>&1; then
            echo "Unable to decrypt TAURI_SIGNING_PRIVATE_KEY with TAURI_SIGNING_PRIVATE_KEY_PASSWORD." >&2
            echo "Re-save both secrets in GitHub without surrounding quotes and without trailing newlines." >&2
            rm -f "$PRECHECK_FILE" "$PRECHECK_FILE.sig"
            exit 1
          fi
          rm -f "$PRECHECK_FILE" "$PRECHECK_FILE.sig"

          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF"
            printf '%s\n' "$TAURI_SIGNING_PRIVATE_KEY"
            echo "EOF"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            echo "PROFILE_SIGNATURE_PUBLIC_KEY=$PROFILE_SIGNATURE_PUBLIC_KEY"
            echo "API_BASE_URL=$API_BASE_URL"
            echo "PROFILE_LOCK_URL=$PROFILE_LOCK_URL"
            echo "LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS=$LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS"
          } >> "$GITHUB_ENV"

      - name: Build launcher artifacts
        working-directory: apps/launcher
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          API_BASE_URL: ${{ env.API_BASE_URL }}
          PROFILE_LOCK_URL: ${{ env.PROFILE_LOCK_URL }}
          SERVER_ID: ${{ vars.LAUNCHER_SERVER_ID }}
          LAUNCHER_UPDATE_ENDPOINT: ${{ vars.LAUNCHER_UPDATE_ENDPOINT }}
          LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS: ${{ env.LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS }}
          LAUNCHER_UPDATE_PUBKEY: ${{ secrets.LAUNCHER_UPDATE_PUBKEY }}
          PROFILE_SIGNATURE_PUBLIC_KEY: ${{ env.PROFILE_SIGNATURE_PUBLIC_KEY }}
          LAUNCHER_INSTALL_CODE: ${{ secrets.LAUNCHER_INSTALL_CODE }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            pnpm tauri build ${{ matrix.args }}
          else
            APPLE_VARS=(
              APPLE_CERTIFICATE
              APPLE_CERTIFICATE_PASSWORD
              APPLE_SIGNING_IDENTITY
              APPLE_ID
              APPLE_PASSWORD
              APPLE_TEAM_ID
            )

            missing_secret=0
            for secret_name in "${APPLE_VARS[@]}"; do
              if [ -z "${!secret_name}" ]; then
                missing_secret=1
                break
              fi
            done

            if [ "$missing_secret" -eq 1 ]; then
              # Force unsigned build when secrets are absent/partial.
              echo "::warning::Building unsigned macOS APP+DMG (Apple signing/notarization secrets missing)."
              unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
              pnpm tauri build ${{ matrix.args }}
            else
              # Try signed build first, then fallback to unsigned to avoid release failures.
              if ! pnpm tauri build ${{ matrix.args }}; then
                echo "::warning::Signed macOS build failed; retrying unsigned APP+DMG."
                unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
                pnpm tauri build ${{ matrix.args }}
              fi
            fi
          fi

      - name: Upload Windows NSIS artifact
        if: matrix.runner_os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: launcher-windows-nsis
          path: apps/launcher/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Windows MSI artifact
        if: matrix.runner_os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: launcher-windows-msi
          path: apps/launcher/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload macOS artifact
        if: matrix.runner_os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: launcher-macos-dmg
          path: apps/launcher/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: launcher-updater-${{ matrix.runner_os }}
          if-no-files-found: error
          path: |
            apps/launcher/src-tauri/target/release/bundle/**/*.sig
            apps/launcher/src-tauri/target/release/bundle/**/*.zip
            apps/launcher/src-tauri/target/release/bundle/**/*.tar.gz

  publish-launcher-assets:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_from_main != 'true' || github.event.inputs.tag != ''
    needs: build-launcher
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Ensure release already exists for this tag
        id: release_lookup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          RELEASE_LOOKUP="$(
            gh api "repos/${{ github.repository }}/releases?per_page=100" \
              | node -e '
                const fs = require("fs");
                const releases = JSON.parse(fs.readFileSync(0, "utf8"));
                const inputTag = process.env.RELEASE_TAG || "";
                const match = releases.find((release) => release.tag_name === inputTag);
                if (match) {
                  process.stdout.write(`${match.id}\t${match.tag_name}`);
                }
              '
          )"
          RELEASE_ID="${RELEASE_LOOKUP%%$'\t'*}"
          RESOLVED_RELEASE_TAG="${RELEASE_LOOKUP#*$'\t'}"
          if [ -z "$RELEASE_ID" ]; then
            echo "No GitHub release exists for tag ${RELEASE_TAG} in ${{ github.repository }}." >&2
            echo "If the release is a draft, ensure it was created in this repository with the exact same tag." >&2
            exit 1
          fi
          echo "id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"
          echo "resolved_tag=${RESOLVED_RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Download all launcher artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate updater latest.json
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/release-artifacts/generated"
          pnpm --filter @minerelay/infra-scripts manifest:generate -- \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --tag "${{ steps.release_lookup.outputs.resolved_tag }}" \
            --artifacts-dir "${GITHUB_WORKSPACE}/release-artifacts" \
            --output "${GITHUB_WORKSPACE}/release-artifacts/generated/latest.json" \
            --required windows,macos

      - name: Upload launcher assets to existing release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_lookup.outputs.resolved_tag }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            release-artifacts/launcher-windows-nsis/*.exe
            release-artifacts/launcher-windows-msi/*.msi
            release-artifacts/launcher-macos-dmg/*.dmg
            release-artifacts/launcher-updater-*/**/*.sig
            release-artifacts/launcher-updater-*/**/*.tar.gz
            release-artifacts/generated/latest.json

  verify-release-updater:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_from_main != 'true' || github.event.inputs.tag != ''
    needs: publish-launcher-assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Resolve existing release tag for verification
        id: verify_release_lookup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          RESOLVED_RELEASE_TAG="$(
            gh api "repos/${{ github.repository }}/releases?per_page=100" \
              | node -e '
                const fs = require("fs");
                const releases = JSON.parse(fs.readFileSync(0, "utf8"));
                const inputTag = process.env.RELEASE_TAG || "";
                const match = releases.find((release) => release.tag_name === inputTag);
                if (match) {
                  process.stdout.write(match.tag_name);
                }
              '
          )"
          if [ -z "$RESOLVED_RELEASE_TAG" ]; then
            echo "No GitHub release exists for tag ${RELEASE_TAG} in ${{ github.repository }}." >&2
            echo "If the release is a draft, ensure it was created in this repository with the exact same tag." >&2
            exit 1
          fi
          echo "resolved_tag=${RESOLVED_RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Verify release updater assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm --filter @minerelay/infra-scripts updater:verify -- \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --tag "${{ steps.verify_release_lookup.outputs.resolved_tag }}" \
            --required windows,macos
