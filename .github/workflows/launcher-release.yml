name: launcher-release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-launcher:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --config src-tauri/tauri.release.conf.json --bundles nsis,msi
          - platform: macos-latest
            args: --config src-tauri/tauri.release.conf.json --bundles app,dmg

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Compute release version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ]; then
            echo "Failed to parse version from tag ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Stamp launcher version for this release
        shell: bash
        run: node apps/launcher/scripts/set-release-version.mjs "${{ steps.version.outputs.version }}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build shared package
        run: pnpm --filter @mvl/shared build

      - name: Validate updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LAUNCHER_UPDATE_PUBKEY: ${{ secrets.LAUNCHER_UPDATE_PUBKEY }}
          PROFILE_SIGNATURE_PUBLIC_KEY: ${{ vars.PROFILE_SIGNATURE_PUBLIC_KEY || secrets.PROFILE_SIGNATURE_PUBLIC_KEY }}
          API_BASE_URL: ${{ vars.LAUNCHER_API_BASE_URL }}
          PROFILE_LOCK_URL: ${{ vars.LAUNCHER_PROFILE_LOCK_URL }}
          LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS: ${{ vars.LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS }}
        run: |
          TAURI_SIGNING_PRIVATE_KEY="$(printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | sed 's/\r$//')"
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD="$(printf '%s' "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" | tr -d '\r\n')"
          PROFILE_SIGNATURE_PUBLIC_KEY="$(printf '%s' "$PROFILE_SIGNATURE_PUBLIC_KEY" | tr -d '\r\n')"
          API_BASE_URL="$(printf '%s' "$API_BASE_URL" | tr -d '\r\n')"
          PROFILE_LOCK_URL="$(printf '%s' "$PROFILE_LOCK_URL" | tr -d '\r\n')"
          LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS="$(printf '%s' "$LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS" | tr -d '\r\n')"
          export TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          export PROFILE_SIGNATURE_PUBLIC_KEY API_BASE_URL PROFILE_LOCK_URL LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS

          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "Missing TAURI_SIGNING_PRIVATE_KEY secret. Updater releases require signing." >&2
            exit 1
          fi
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo "Missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret." >&2
            echo "Passwordless updater keys are not reliable in CI; generate a password-protected key and set both secrets." >&2
            exit 1
          fi
          if [ -z "$LAUNCHER_UPDATE_PUBKEY" ]; then
            echo "Missing LAUNCHER_UPDATE_PUBKEY secret. The app needs the updater public key to verify updates." >&2
            exit 1
          fi
          if [ -z "$PROFILE_SIGNATURE_PUBLIC_KEY" ]; then
            echo "Missing PROFILE_SIGNATURE_PUBLIC_KEY (set repo variable PROFILE_SIGNATURE_PUBLIC_KEY or secret PROFILE_SIGNATURE_PUBLIC_KEY)." >&2
            exit 1
          fi
          node -e 'const raw=(process.env.PROFILE_SIGNATURE_PUBLIC_KEY||"").trim(); if(!raw){console.error("PROFILE_SIGNATURE_PUBLIC_KEY is empty after trimming"); process.exit(1)} if(raw.length%4!==0 || !/^[A-Za-z0-9+/]+={0,2}$/.test(raw)){console.error("PROFILE_SIGNATURE_PUBLIC_KEY must be valid base64"); process.exit(1)} const decoded=Buffer.from(raw,"base64"); if(decoded.length!==32){console.error("PROFILE_SIGNATURE_PUBLIC_KEY must decode to 32 bytes (Ed25519 public key)"); process.exit(1)}'
          node -e 'const api=(process.env.API_BASE_URL||"").trim(); const lock=(process.env.PROFILE_LOCK_URL||"").trim(); const valid=(value)=>{try{const parsed=new URL(value); return parsed.protocol==="http:"||parsed.protocol==="https:"}catch{return false}}; if(api && !valid(api)){console.error("LAUNCHER_API_BASE_URL must be a valid http/https URL"); process.exit(1)} if(lock && !valid(lock)){console.error("LAUNCHER_PROFILE_LOCK_URL must be a valid http/https URL"); process.exit(1)}'
          node -e 'const raw=(process.env.LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS||"").trim(); if(!raw){process.exit(0)} for(const host of raw.split(",").map(v=>v.trim()).filter(Boolean)){if(!/^[a-zA-Z0-9.-]+$/.test(host)){console.error(`Invalid host in LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS: ${host}`); process.exit(1)}}'

          PRECHECK_FILE="$(mktemp)"
          printf 'updater-signing-precheck\n' > "$PRECHECK_FILE"
          if ! pnpm --filter @mvl/launcher tauri signer sign "$PRECHECK_FILE" >/dev/null 2>&1; then
            echo "Unable to decrypt TAURI_SIGNING_PRIVATE_KEY with TAURI_SIGNING_PRIVATE_KEY_PASSWORD." >&2
            echo "Re-save both secrets in GitHub without surrounding quotes and without trailing newlines." >&2
            rm -f "$PRECHECK_FILE" "$PRECHECK_FILE.sig"
            exit 1
          fi
          rm -f "$PRECHECK_FILE" "$PRECHECK_FILE.sig"

          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<EOF"
            printf '%s\n' "$TAURI_SIGNING_PRIVATE_KEY"
            echo "EOF"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            echo "PROFILE_SIGNATURE_PUBLIC_KEY=$PROFILE_SIGNATURE_PUBLIC_KEY"
            echo "API_BASE_URL=$API_BASE_URL"
            echo "PROFILE_LOCK_URL=$PROFILE_LOCK_URL"
            echo "LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS=$LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS"
          } >> "$GITHUB_ENV"

      - name: Build and publish launcher release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          API_BASE_URL: ${{ env.API_BASE_URL }}
          PROFILE_LOCK_URL: ${{ env.PROFILE_LOCK_URL }}
          SERVER_ID: ${{ vars.LAUNCHER_SERVER_ID }}
          LAUNCHER_UPDATE_ENDPOINT: ${{ vars.LAUNCHER_UPDATE_ENDPOINT }}
          LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS: ${{ env.LAUNCHER_SERVER_CONTROL_TRUSTED_HOSTS }}
          LAUNCHER_UPDATE_PUBKEY: ${{ secrets.LAUNCHER_UPDATE_PUBKEY }}
          PROFILE_SIGNATURE_PUBLIC_KEY: ${{ env.PROFILE_SIGNATURE_PUBLIC_KEY }}
          LAUNCHER_INSTALL_CODE: ${{ secrets.LAUNCHER_INSTALL_CODE }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/launcher
          tagName: ${{ github.ref_name }}
          releaseName: Launcher ${{ github.ref_name }}
          releaseBody: Automated launcher release for ${{ github.ref_name }}.
          releaseDraft: false
          prerelease: ${{ steps.version.outputs.is_prerelease }}
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

  verify-release-updater:
    needs: publish-launcher
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Verify release updater assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm --filter @mvl/infra-scripts updater:verify -- \
            --owner isaacismaelx14 \
            --repo minecraft-server-sync \
            --tag "${{ github.ref_name }}" \
            --required windows,macos
