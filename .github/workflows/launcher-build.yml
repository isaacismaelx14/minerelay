name: launcher-build

on:
  push:
    branches: [main]
    paths:
      - 'apps/launcher/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - 'turbo.json'
      - '.github/workflows/launcher-build.yml'
  pull_request:
    paths:
      - 'apps/launcher/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - 'turbo.json'
      - '.github/workflows/launcher-build.yml'

jobs:
  build-launcher:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build shared package
        run: pnpm --filter @mvl/shared build

      - name: Build Tauri bundle
        working-directory: apps/launcher
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            pnpm tauri build --bundles nsis,msi
          else
            APPLE_VARS=(
              APPLE_CERTIFICATE
              APPLE_CERTIFICATE_PASSWORD
              APPLE_SIGNING_IDENTITY
              APPLE_ID
              APPLE_PASSWORD
              APPLE_TEAM_ID
            )

            missing_secret=0
            for secret_name in "${APPLE_VARS[@]}"; do
              if [ -z "${!secret_name}" ]; then
                missing_secret=1
                break
              fi
            done

            if [ "$missing_secret" -eq 1 ]; then
              # Force unsigned build when secrets are absent/partial.
              echo "::warning::Building unsigned macOS DMG (Apple signing/notarization secrets missing)."
              unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
              pnpm tauri build --bundles dmg
            else
              # Try signed build first, then fallback to unsigned to avoid release failures.
              if ! pnpm tauri build --bundles dmg; then
                echo "::warning::Signed macOS build failed; retrying unsigned DMG."
                unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
                pnpm tauri build --bundles dmg
              fi
            fi
          fi
        shell: bash

      - name: Upload Windows NSIS artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: launcher-windows-nsis
          path: apps/launcher/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Windows MSI artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: launcher-windows-msi
          path: apps/launcher/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: launcher-macos-dmg
          path: apps/launcher/src-tauri/target/release/bundle/dmg/*.dmg

  release-launcher:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-launcher
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute beta release metadata
        id: meta
        run: |
          VERSION=$(node -p "require('./apps/launcher/package.json').version")
          TAG="v${VERSION}-beta.${{ github.run_number }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=Launcher ${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download all launcher artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish beta GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: true
          generate_release_notes: true
          files: |
            release-artifacts/launcher-windows-nsis/*.exe
            release-artifacts/launcher-windows-msi/*.msi
            release-artifacts/launcher-macos-dmg/*.dmg
