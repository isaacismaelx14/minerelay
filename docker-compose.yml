services:
  postgres:
    image: postgres:16-alpine
    container_name: mvl_syncer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mvl_syncer
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mvl_syncer"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mvl_syncer_pgdata:/var/lib/postgresql/data

  fancymenu-sandbox:
    build:
      context: .
      dockerfile: apps/fancymenu-sandbox/Dockerfile
    container_name: mvl_fancymenu_sandbox
    restart: unless-stopped
    environment:
      PORT: 3210
      FANCYMENU_SANDBOX_API_KEY: sandbox-dev-key
      FANCYMENU_PREVIEW_TTL_SECONDS: 1800
    expose:
      - "3210"

volumes:
  mvl_syncer_pgdata:
